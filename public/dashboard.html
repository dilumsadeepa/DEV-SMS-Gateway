<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puppy SMS Gateway | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
<main class="auth-shell">
  <header class="auth-hero">
    <div>
      <p class="eyebrow">Puppy SMS Gateway</p>
      <h1>Sign In To Console</h1>
      <p class="subtitle">Login or register, then use the command panel, account activity, and super admin dashboard links.</p>
    </div>
    <a class="btn" href="/">Back To Landing</a>
  </header>

  <div id="noticeBanner" class="banner banner-notice hidden"></div>
  <div id="errorBanner" class="banner banner-error hidden"></div>

  <section class="auth-grid">
    <form id="registerForm" class="card">
      <h2>Register</h2>
      <p class="panel-subtitle">Create a user account. Registration may be disabled by super admin.</p>

      <div class="form-grid">
        <label class="field">
          <span>Name</span>
          <input id="registerName" name="name" type="text" required minlength="2" />
        </label>

        <label class="field">
          <span>Email</span>
          <input id="registerEmail" name="email" type="email" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="registerPassword" name="password" type="password" required minlength="8" />
        </label>

        <button type="submit" class="btn btn-primary">Register</button>
      </div>
    </form>

    <form id="loginForm" class="card">
      <h2>Login</h2>
      <p class="panel-subtitle">Use your account to open the SMS gateway console.</p>

      <div class="form-grid">
        <label class="field">
          <span>Email</span>
          <input id="loginEmail" name="email" type="email" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="loginPassword" name="password" type="password" required />
        </label>

        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>
  </section>
</main>

<script src="/assets/js/app-common.js"></script>
<script src="/assets/js/auth-page.js"></script>
</body>
</html>
